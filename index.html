<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Абхазия Трансфер</title>
<link rel="icon" href="abkhaziatransfer.png">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">Абхазия Трансфер</div>
    <div class="sub">Индивидуальный трансфер и экскурсии</div>
    <div class="sub2">Минивэн 7 мест • Комфорт • Безопасно</div>
</header>

<section class="hero">
    <h1>Закажи трансфер в Абхазии</h1>
    <p>Быстро • Надёжно • Комфортно</p>
</section>

<section class="booking">
    <h2>Заявка на трансфер</h2>

    <form id="bookingForm">
        <input type="text" id="name" placeholder="Ваше имя" required>
        <input type="tel" id="phone" placeholder="Телефон" required>
        <input type="date" id="date" required>

        <button type="submit">Забронировать</button>
    </form>
</section>

<footer>
    © 2026 Абхазия Трансфер
</footer>

<script>
const BOT_TOKEN = "ВСТАВЬ_НОВЫЙ_ТОКЕН";
const CHAT_ID = "ВСТАВЬ_CHAT_ID";

document.getElementById("bookingForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const date = document.getElementById("date").value;

    const text =
`🚐 Новая заявка

👤 Имя: ${name}
📞 Телефон: ${phone}
📅 Дата: ${date}`;

    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text
        })
    });

    alert("Заявка отправлена!");
});
</script>

</body>
</html>
