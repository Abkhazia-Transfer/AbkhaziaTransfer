<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Абхазия Трансфер</title>

<link rel="icon" href="abkhaziatransfer.png">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<img src="abkhazia_transfer.png" class="img2" alt="Логотип">

<div class="logo">Абхазия Трансфер</div>

<div class="sub">
Индивидуальный трансфер и экскурсии
</div>

<div class="sub2">
Минивэн 7 мест • Комфорт • Безопасно
</div>

</header>

<section class="hero">

<h1>Закажите трансфер</h1>

<p>Быстро • Надёжно • Комфортно</p>

</section>

<section class="booking">

<h2>Заявка</h2>

<form id="bookingForm">

<input
type="text"
id="name"
placeholder="Ваше имя"
required>

<input
type="tel"
id="phone"
placeholder="Телефон"
required>

<input
type="email"
id="email"
placeholder="Email (необязательно)">

<label for="date" class="date-label">
Дата поездки
</label>

<input type="date" id="date" required>

<small class="date-hint">
Нажмите на поле и выберите дату
</small>

<button type="submit">
Отправить заявку
</button>

</form>

</section>

<footer>

© 2026 Абхазия Трансфер. Все права защищены.

</footer>

<script>

const BOT_TOKEN = "YOUR_NEW_BOT_TOKEN";

const CHAT_ID = "-1004349999011";

document.addEventListener("DOMContentLoaded", ()=>{

const today = new Date().toISOString().split("T")[0];

document.getElementById("date").min = today;

});

document.getElementById("bookingForm").addEventListener("submit", async function(e){

e.preventDefault();

const name=document.getElementById("name").value.trim();

const phone=document.getElementById("phone").value.trim();

const email=document.getElementById("email").value.trim();

const date=document.getElementById("date").value;

if(!name || !phone || !date){

alert("Заполните имя, телефон и дату");

return;

}

const text=`🚐 Новая заявка

👤 Имя: ${name}

📞 Телефон: ${phone}

📧 Email: ${email || "не указан"}

📅 Дата: ${date}`;

const formData=new FormData();

formData.append("chat_id",CHAT_ID);

formData.append("text",text);

try{

const response=await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{

method:"POST",

body:formData

});

const data=await response.json();

if(data.ok){

alert("Ваша заявка отправлена!");

this.reset();

}else{

alert("Ошибка: "+data.description);

}

}catch{

alert("Ошибка сети");

}

});

</script>

</body>
</html>
